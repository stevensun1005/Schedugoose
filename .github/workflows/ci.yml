name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[llm,rag,dev]"

      - name: Unit + integration tests
        run: python -m pytest -q

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check .

      # MLOps quality gate: the eval harness must keep plan correctness at 100%.
      # Runs offline (no API keys) so it is deterministic in CI.
      - name: Eval harness (model quality gate)
        run: python -m eval.run_eval

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t schedugoose:ci .
